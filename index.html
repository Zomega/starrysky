<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starrysky</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="shooting_stars.css" />
  </head>
  <body>
    <div class="sky-container">
      <div class="night">
        <script>
          const nightSky = document.querySelector(".night");
          const randomStart = Math.random() * -240;
          nightSky.style.setProperty("--sky-delay", `${randomStart}s`);

          // TODO: Need to base the durations on screen sizing.
          // TODO: Can probably reduce the star count and decrease the dark time.
          const starCount = 20;

          function animateStar(star) {
            star.classList.remove("is-shooting");

            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;

            setTimeout(() => {
              star.classList.add("is-shooting");
            }, 50);

            // 4. Calculate the "Dark Time" (e.g., between 2s and 15s of waiting)
            const darkTime = 2000 + Math.random() * 13000;
            setTimeout(() => {
              animateStar(star);
            }, 3000 + darkTime);
          }

          for (let i = 0; i < starCount; i++) {
            const star = document.createElement("div");
            star.className = "shooting_star";
            nightSky.appendChild(star);

            const initialDelay = Math.random() * 15000;
            setTimeout(() => {
              animateStar(star);
            }, initialDelay);
          }
        </script>
      </div>
    </div>

    <div class="container">
      <span class="tagline">AT Protocol Based Streaks</span>
      <h1>Starrysky</h1>
      <p>Your daily streaks and achievements, powered by ATProto</p>

      <div class="login-box">
        <input type="text" placeholder="your-handle.bsky.social" disabled />
        <br />
        <button disabled>Coming Soon</button>
      </div>

      <p style="margin-top: 2rem; font-size: 0.8rem">
        Built for the Atmosphere
      </p>
    </div>
  </body>
</html>
