<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starrysky</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="homepage.css" />
    <link rel="stylesheet" href="shooting_stars.css" />
    <script type="importmap">
      {
        "imports": {
          "i18next": "https://esm.sh/i18next@23.10.0",
          "js-confetti": "https://esm.sh/js-confetti@0.12.0"
        }
      }
    </script>
    <script src="theme.js"></script>
  </head>
  <body>
    <header class="top-nav">
      <button id="logout-btn" style="display: none" title="Log Out">
        <span class="material-symbols-outlined">logout</span>
      </button>
      <button class="theme-toggle">
        <span class="material-symbols-outlined sun" aria-hidden="true"
          >light_mode</span
        >
        <span class="material-symbols-outlined moon" aria-hidden="true"
          >dark_mode</span
        >
        <span class="sr-only">Toggle Color Theme</span>
      </button>
    </header>

    <div class="sky-container">
      <div class="night">
        <script src="shooting_stars.js"></script>
      </div>
    </div>

    <div class="container">
      <span class="tagline">AT Protocol Based Streaks</span>
      <h1>Starrysky</h1>
      <p>Your daily streaks and achievements, powered by ATProto</p>

      <div class="login-box card frosted">
        <div id="login-section">
          <p id="status">Connecting to Bluesky...</p>
          <input type="text" id="handle" placeholder="alice.bsky.social" />
          <br />
          <button id="login-btn" disabled>Login with ATProto</button>
        </div>

        <div id="game-section" style="display: none">
          <h2>Welcome Back!</h2>
          <p id="user-info"></p>
          <div id="wordle-ui">
            <button id="save-checkin-btn">Simulate Check-in</button>
          </div>
        </div>
      </div>
      <script type="module" src="login.js"></script>

      <p style="margin-top: 2rem; font-size: 0.8rem">
        Built for the Atmosphere
      </p>
    </div>

    <footer class="bottom-badges">
      <a
        href="https://ko-fi.com/woursler"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img
          src="https://img.shields.io/badge/Ko--fi-3b82f6?style=for-the-badge&logo=ko-fi&logoColor=white"
          alt="Support on Ko-fi"
        />
      </a>
      <a
        href="https://github.com/Zomega/starrysky"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img
          src="https://img.shields.io/badge/GitHub-3b82f6?style=for-the-badge&logo=github&logoColor=white"
          alt="GitHub Repository"
        />
      </a>
      <a
        href="https://github.com/Zomega/starrysky/blob/main/LICENSE"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img
          src="https://img.shields.io/github/license/Zomega/starrysky?style=for-the-badge&color=3b82f6"
          alt="License"
        />
      </a>
    </footer>
  </body>
</html>
