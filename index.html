<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starrysky</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="shooting_stars.css" />
  </head>
  <body>
    <div class="sky-container">
      <div class="night">
        <script>
          const nightSky = document.querySelector(".night");
          const randomStart = Math.random() * -240;
          nightSky.style.setProperty("--sky-delay", `${randomStart}s`);

          // 1. Always generate a healthy pool of stars
          const starCount = 20;

          // 2. Determine the time window based on screen width
          // Mobile screens spread stars over 30s. Desktop over 10s.
          const maxDelay = window.innerWidth < 600 ? 30000 : 10000;

          for (let i = 0; i < starCount; i++) {
            const star = document.createElement("div");
            star.className = "shooting_star";

            const top = Math.random() * 100;
            const left = Math.random() * 100;

            // Stars get a random delay inside the designated time window
            const delay = Math.random() * maxDelay;

            star.style.top = `${top}%`;
            star.style.left = `${left}%`;
            star.style.setProperty("--star-delay", `${delay}ms`);

            nightSky.appendChild(star);
          }
        </script>
      </div>
    </div>

    <div class="container">
      <span class="tagline">AT Protocol Based Streaks</span>
      <h1>Starrysky</h1>
      <p>Your daily streaks and achievements, powered by ATProto</p>

      <div class="login-box">
        <input type="text" placeholder="your-handle.bsky.social" disabled />
        <br />
        <button disabled>Coming Soon</button>
      </div>

      <p style="margin-top: 2rem; font-size: 0.8rem">
        Built for the Atmosphere
      </p>
    </div>
  </body>
</html>
