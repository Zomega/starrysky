<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starrysky</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="shooting_stars.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body>
    <header class="top-nav">
      <button class="theme-toggle">
        <span class="material-symbols-outlined sun" aria-hidden="true"
          >light_mode</span
        >
        <span class="material-symbols-outlined moon" aria-hidden="true"
          >dark_mode</span
        >
        <span class="sr-only">Toggle Color Theme</span>
      </button>
    </header>

    <div class="sky-container">
      <div class="night">
        <script src="shooting_stars.js"></script>
      </div>
    </div>

    <div class="container">
      <span class="tagline">AT Protocol Based Streaks</span>
      <h1>Starrysky</h1>
      <p>Your daily streaks and achievements, powered by ATProto</p>

      <div class="login-box">
        <input type="text" placeholder="your-handle.bsky.social" disabled />
        <br />
        <button disabled>Coming Soon</button>
      </div>

      <p style="margin-top: 2rem; font-size: 0.8rem">
        Built for the Atmosphere
      </p>
    </div>

    <footer class="bottom-badges">
      <a
        href="https://ko-fi.com/woursler"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img
          src="https://img.shields.io/badge/Ko--fi-3b82f6?style=for-the-badge&logo=ko-fi&logoColor=white"
          alt="Support on Ko-fi"
        />
      </a>
      <a
        href="https://github.com/Zomega/starrysky"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img
          src="https://img.shields.io/badge/GitHub-3b82f6?style=for-the-badge&logo=github&logoColor=white"
          alt="GitHub Repository"
        />
      </a>
      <a
        href="https://github.com/Zomega/starrysky/blob/main/LICENSE"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img
          src="https://img.shields.io/github/license/Zomega/starrysky?style=for-the-badge&color=3b82f6"
          alt="License"
        />
      </a>
    </footer>

    <script>
      document.querySelector(".theme-toggle").addEventListener("click", () => {
        const isLight =
          document.documentElement.classList.contains("force-light-mode");
        const isDark =
          document.documentElement.classList.contains("force-dark-mode");
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;

        document.documentElement.classList.remove(
          "force-light-mode",
          "force-dark-mode",
        );

        if (isLight) document.documentElement.classList.add("force-dark-mode");
        else if (isDark)
          document.documentElement.classList.add("force-light-mode");
        else if (prefersDark)
          document.documentElement.classList.add("force-light-mode");
        else document.documentElement.classList.add("force-dark-mode");
      });
    </script>
  </body>
</html>
