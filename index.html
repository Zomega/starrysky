<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starrysky</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="shooting_stars.css" />
  </head>
  <body>
    <div class="night">
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
      <div class="shooting_star"></div>
    </div>
    <script>
      const nightSky = document.querySelector(".night");
      const randomStart = Math.random() * -240;
      nightSky.style.animationDelay = `${randomStart}s`;
      nightSky.style.setProperty("--sky-delay", `${randomStart}s`);

      // 2. Initialize each individual star
      const stars = document.querySelectorAll(".shooting_star");

      stars.forEach((star) => {
        // Random position between 0% and 100%
        const top = Math.random() * 100;
        const left = Math.random() * 100;

        // Random delay between 0 and 10000 milliseconds
        const delay = Math.random() * 10000;

        // Apply styles directly to the element
        star.style.top = `${top}%`;
        star.style.left = `${left}%`;
        star.style.setProperty("--star-delay", `${delay}ms`);
      });
    </script>

    <div class="container">
      <span class="tagline">AT Protocol Based Streaks</span>
      <h1>Starrysky</h1>
      <p>Your daily streaks and achievements, powered by ATProto</p>

      <div class="login-box">
        <input type="text" placeholder="your-handle.bsky.social" disabled />
        <br />
        <button disabled>Coming Soon</button>
      </div>

      <p style="margin-top: 2rem; font-size: 0.8rem">
        Built for the Atmosphere
      </p>
    </div>
  </body>
</html>
