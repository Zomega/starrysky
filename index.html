<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starrysky</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="shooting_stars.css" />
  </head>
  <body>
    <div class="night">
      <script>
        // 1. Initialize the global sky
        const nightSky = document.querySelector(".night");
        const randomStart = Math.random() * -240;
        nightSky.style.setProperty("--sky-delay", `${randomStart}s`);

        // 2. Calculate density based on screen width
        // Desktop (~1920px) gets ~19 stars. Mobile (~400px) gets ~4 stars.
        const starCount = Math.max(3, Math.floor(window.innerWidth / 100)); // Minimum of 3 stars

        // 3. Generate stars dynamically
        for (let i = 0; i < starCount; i++) {
          // Create the div
          const star = document.createElement("div");
          star.className = "shooting_star";

          // Randomize data
          const top = Math.random() * 100;
          const left = Math.random() * 100;
          const delay = Math.random() * 10000;

          // Apply styles
          star.style.top = `${top}%`;
          star.style.left = `${left}%`;
          star.style.setProperty("--star-delay", `${delay}ms`);

          // Inject into the DOM
          nightSky.appendChild(star);
        }
      </script>
    </div>

    <div class="container">
      <span class="tagline">AT Protocol Based Streaks</span>
      <h1>Starrysky</h1>
      <p>Your daily streaks and achievements, powered by ATProto</p>

      <div class="login-box">
        <input type="text" placeholder="your-handle.bsky.social" disabled />
        <br />
        <button disabled>Coming Soon</button>
      </div>

      <p style="margin-top: 2rem; font-size: 0.8rem">
        Built for the Atmosphere
      </p>
    </div>
  </body>
</html>
