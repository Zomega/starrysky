/* THE NEW UNIFIED CARD CLASS */
.card {
  background-color: var(--color-card-background);
  border-radius: 0.5rem;
  padding: 1rem;
  
  max-width: 500px;
  margin: 1.5rem auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  color: var(--color-text);
  overflow: hidden;

  @media (width < 600px) {
    flex-direction: column;
    text-align: center;
  }
}

.card h2 {
  font-size: 1.5rem;
  font-weight: bold;
  margin-top: 0;
  margin-bottom: 0.5rem;
  text-align: left;
  color: var(--color-text-heading);
}

@media (width < 600px) {
  .card h2 {
    text-align: center;
  }
}

.victory-text {
  display: grid;
  gap: 0.5rem;
  position: relative;
  z-index: 1;
}

.star-display {
  display: grid;
  grid-template-areas: 'center';
  place-content: center;
  width: 5rem;
  height: 5rem;

  --star-size: 2.2rem;
}

.single {
  --star-size: 3.3rem;
}

.double {
  --star-size: 2.75rem;
  --distance: calc(var(--star-size) * 1 / 2);

  :first-child {
    --angle: 180deg;
  }

  :last-child {
    --angle: 0deg;
  }
}

.confetti-blaster,
.circle {
  --distance: calc(var(--star-size) * 3 / 4);

  .star {
    --angle: 90deg + calc(var(--index) * 360deg / var(--count));
  }
}

.count-5 {
  --distance: calc(var(--star-size) * 4 / 5);
}

.over-five {
  --star-size: 1.65rem;
  --distance: calc(var(--star-size) * 1.25);
}

.confetti-blaster {
  --distance: 10em;

  .star:not(:first-child) {
    --duration: 3s;
    animation:
      star-move var(--duration) ease-out both,
      fade-in-out 1.5s ease-out both;
    animation-delay: calc(var(--delay-multiplier) * 3s);
    --count: 10;
    
    --angle: 90deg + calc(var(--index) * 355deg / var(--count));
  }

  .star:first-child {
    --distance: 0;
    --star-size: 3.3rem;
    z-index: 1;
  }
}

.star {
  --star-color: var(--color-success);
  --delay: calc(var(--delay-multiplier) * 10s);
  --duration: 0.5s;

  grid-area: center;
  transform-origin: center;
  animation:
    star-move var(--duration) var(--ease-out-back) both,
    fade-in var(--duration) ease-out both;
  /* TODO... use easing... */
  animation-delay: var(--delay);
  display: grid;
  grid-template-areas: 'center';
  position: relative;
}

.material-symbols-outlined {
  display: block;
  line-height: 1;
}

.star-icon {
  font-size: var(--star-size);
  grid-area: center;
  place-self: center;
}

.star-bg {
  color: var(--color-star-bg);
  font-variation-settings: 'FILL' 0;
}

.star-front {
  color: var(--star-color);
  font-variation-settings: 'FILL' 1;
  scale: 0.9;
}

@keyframes star-move {
  from {
    rotate: -180deg;
    scale: 0.5;
  }

  to {
    translate: calc(cos(var(--angle)) * var(--distance))
      calc(sin(var(--angle)) * var(--distance));
  }
}

@keyframes fade-in {
  from {
    opacity: 0;
  }
}

.star-sparkles {
  --size: 90%;

  display: block;
  line-height: 1;
  position: absolute;
  font-size: var(--size);
  color: var(--color-white);
  top: 25%;
  right: 25%;
  animation: star-sparkles 3.5s ease-out both infinite;
  animation-delay: calc(var(--delay) + var(--duration) + 0.2s);
}

@keyframes star-sparkles {
  0% {
    opacity: 0;
    scale: 0;
  }
  15% {
    opacity: 1;
    scale: 1;
  }
  30% {
    opacity: 0;
    scale: 0;
  }
  100% {
    opacity: 0;
    scale: 0;
  }
}

@keyframes fade-in-out {
  0% {
    opacity: 0;
  }
  50% {
    opacity: 1;
  }
  100% {
    opacity: 0;
  }
}

.theme-toggle {
  appearance: none;
  background: none;
  border: none;
  padding: 1em;
  color: var(--color-text);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.5em;
  font-weight: 600;
}

.sr-only {
  border: 0; 
  clip: rect(0 0 0 0); 
  clip-path: polygon(0px 0px, 0px 0px, 0px 0px);
  -webkit-clip-path: polygon(0px 0px, 0px 0px, 0px 0px);
  height: 1px; 
  margin: -1px;
  overflow: hidden;
  padding: 0;
  position: absolute;
  width: 1px;
  white-space: nowrap;
}

header {
  position: absolute;
  top: 0;
  right: 0;
  padding: 0.5em;
}

hr {
  border: none;
  height: 1px;
  background-color: var(--color-background-secondary);
}

p {
  text-align: center;
  
  a {
    color: var(--color-interactive);
  }
}

b {
  font-weight: 600;
  font-style: italic;
}

.game-info {
  display: grid;
  gap: 0.75em;
  font-size: 1.25rem;
}
</style>
<script>
const starMarkup = (index) => `
  <div
    class="star"
    style="--index: ${index}; --delay-multiplier: ${0.01 * index}"
  >
    <span class="material-symbols-outlined star-icon star-bg">star</span>
    <span class="material-symbols-outlined star-icon star-front">star</span>
    <span class="star-sparkles">&#x2726;</span>
  </div>
`

function panelMarkup(count) {
  const variantClasses = getVariantClasses(count);
  
  let starElements = [];
  
  for(let i = 0; i < count; i++) {
    starElements.push(starMarkup(i));
  }
  
  return `
    <div class="card">
        <div
          class="star-display ${variantClasses.join(' ')} count-${count}"
          style="--count: ${count}"
        >
          ${starElements.join(' ')}
        </div> 

        <div class="victory-text">
          <h2>${count} day streak!</h2>

          <p>
            Come back tomorrow to continue your streak!
          </p>
        </div>
  </div>`
}

function getVariantClasses(count) {
  const classes = [];
  
  if (count === 1) {
    classes.push('single');
    return classes;
  }

  if (count === 2) {
    classes.push('double');
    return classes;
  }

  if (count > 5) {
    classes.push('over-five');
  }

  if (count <= 10) {
    classes.push('circle');
    return classes;
  }

  classes.push('confetti-blaster');

  return classes;
}

window.addEventListener('DOMContentLoaded', (event) => {
  const container = document.querySelector('.container');
  container.innerHTML = panelMarkup(1);

  document.querySelector('.theme-toggle').addEventListener('click', () => {
    if(document.documentElement.classList.contains('force-light-mode')) {
      document.documentElement.classList.remove('force-light-mode');
      document.documentElement.classList.add('force-dark-mode');
      return;
    }
    if(document.documentElement.classList.contains('force-dark-mode')) {
      document.documentElement.classList.remove('force-dark-mode');
      document.documentElement.classList.add('force-light-mode');
      return;
    }
    if(window.matchMedia('(prefers-color-scheme: dark)')) {
      document.documentElement.classList.add('force-light-mode');
      return;
    }
    document.documentElement.classList.add('force-dark-mode');
  })

  document.querySelector('input').addEventListener('input', (e) => {
    container.innerHTML = panelMarkup(parseInt(e.target.value));
  })
});
</script>
<main>
  <header>
    <button class="theme-toggle">
      <span class="material-symbols-outlined sun" aria-hidden="true">light_mode</span>
      <span class="material-symbols-outlined moon" aria-hidden="true">dark_mode</span>
      <span class="sr-only">Toggle Color Theme</span>
    </button>
  </header>
  
  <div class="container">
  </div>
  
  <label>
    <span>Streak count:</span>
    <input type="number" value="1" max="1000" min="0"/>
  </label>
  
  <hr />
  
  <div class="game-info">
    <p><a href="https://codepen.io/phebert/pen/LEpMQKm" target="_BLANK">Many thanks to Paul Herbert for the original code this is based on.</a></p>
  </div>
