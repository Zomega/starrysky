<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Streak Mockup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="mockup.css" />
  </head>
  <body>
    <main>
      <header class="top-nav">
        <button id="logout-btn" style="display: none" title="Log Out">
          <span class="material-symbols-outlined">logout</span>
        </button>
        <button class="theme-toggle">
          <span class="material-symbols-outlined sun" aria-hidden="true"
            >light_mode</span
          >
          <span class="material-symbols-outlined moon" aria-hidden="true"
            >dark_mode</span
          >
          <span class="sr-only">Toggle Color Theme</span>
        </button>
      </header>

      <div class="container">
        <div class="card controls-card">
          <label>
            <span>Streak count:</span>
            <input type="number" value="1" max="1000" min="0" />
          </label>
        </div>
        <div class="card-container">
          <!-- JS will inject templates here -->
        </div>
      </div>

      <template id="tpl-star">
        <div class="star">
          <span class="material-symbols-outlined star-icon star-bg">star</span>
          <span class="material-symbols-outlined star-icon star-front"
            >star</span
          >
          <span class="star-sparkles">&#x2726;</span>
        </div>
      </template>

      <template id="tpl-streak-grid">
        <div class="streak-grid-container"></div>
      </template>

      <template id="tpl-day-cell">
        <div class="day-cell"></div>
      </template>

      <template id="tpl-streak-pill">
        <div class="streak-pill"></div>
      </template>

      <template id="tpl-freeze-icon">
        <span class="material-symbols-outlined freeze-icon-mini">ac_unit</span>
      </template>

      <template id="tpl-streak-row">
        <div class="streak-row">
          <div class="streak-name"></div>
          <div class="streak-total"></div>
        </div>
      </template>

      <template id="tpl-fancy-streak-card">
        <div class="card fancy-streak">
          <div class="star-display"></div>
          <div class="victory-text">
            <h2 class="streak-association"></h2>
            <h2 class="streak-title"></h2>
            <p>Come back tomorrow to continue your streak!</p>
          </div>
        </div>
      </template>

      <template id="tpl-freeze-card">
        <div class="card flex-row" id="freeze-card">
          <div class="freeze-icon-wrap">
            <span class="material-symbols-outlined freeze-icon">ac_unit</span>
          </div>
          <div class="freeze-info">
            <p class="freeze-count-text"></p>
            <a href="#">GET MORE</a>
          </div>
        </div>
      </template>

      <template id="tpl-calendar-card">
        <div class="card" id="calendar-card">
          <h2>Streak Calendar</h2>
          <div class="calendar-header">
            <span class="material-symbols-outlined nav-arrow"
              >chevron_left</span
            >
            <h3 class="calendar-month-title"></h3>
            <span class="material-symbols-outlined nav-arrow"
              >chevron_right</span
            >
          </div>
          <div class="calendar-days-header">
            <span>Su</span><span>Mo</span><span>Tu</span><span>We</span
            ><span>Th</span><span>Fr</span><span>Sa</span>
          </div>
          <div class="calendar-weeks"></div>
        </div>
      </template>

      <template id="tpl-multi-streak-card">
        <div class="card" id="multi-streak-card">
          <h2>Multiple Streaks</h2>
          <div class="multi-streak-header">
            <div class="streak-name"></div>
            <div class="month-labels">
              <div class="month-label prev">Mar</div>
              <div class="month-label current">Apr</div>
            </div>
            <div class="streak-total"></div>
          </div>
          <div class="multi-streak-header">
            <div class="streak-name"></div>
            <div class="day-labels">
              <span>Tu</span><span>We</span><span>Th</span><span>Fr</span
              ><span>Sa</span><span>Su</span><span>Mo</span><span>Tu</span>
            </div>
            <div class="streak-total"></div>
          </div>
          <div class="multi-streak-grid"></div>
        </div>
      </template>

      <template id="tpl-goal-card">
        <div class="card" id="goal-card">
          <h2>Streak Goal</h2>
          <div class="progress-container">
            <div class="progress-track">
              <div class="progress-bg"><div class="progress-fill"></div></div>
            </div>
            <div class="checkpoint-layer">
              <div class="checkpoint">
                <span class="material-symbols-outlined">check</span>
              </div>
              <div class="checkpoint" style="left: 25%">
                <span class="material-symbols-outlined">check</span>
              </div>
              <div class="checkpoint" style="left: 55%">
                <span class="material-symbols-outlined">check</span>
              </div>
            </div>
            <div class="goal-target"><div class="goal-badge"></div></div>
          </div>
          <div class="goal-text"></div>
        </div>
      </template>

      <hr />
      <div class="game-info">
        <p>
          <a href="https://codepen.io/phebert/pen/LEpMQKm" target="_BLANK"
            >Many thanks to Paul Herbert for the original code this is based
            on.</a
          >
        </p>
      </div>
    </main>
    <script src="mockup.js"></script>
    <script type="module" src="login.js"></script>
  </body>
</html>
