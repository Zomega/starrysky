<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Not Found - Starrysky</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="homepage.css" />
    <link rel="stylesheet" href="shooting_stars.css" />
    <script src="theme.js"></script>
  </head>
  <body>
    <header class="top-nav">
      <button class="theme-toggle">
        <span class="material-symbols-outlined sun" aria-hidden="true"
          >light_mode</span
        >
        <span class="material-symbols-outlined moon" aria-hidden="true"
          >dark_mode</span
        >
        <span class="sr-only">Toggle Color Theme</span>
      </button>
    </header>

    <div class="sky-container">
      <div class="night">
        <!-- shooting stars will be injected here -->
      </div>
    </div>

    <div class="container">
      <div class="card frosted" style="padding: 3rem">
        <h1 style="font-size: 4rem; margin-bottom: 1rem">404</h1>
        <p style="font-size: 1.25rem; margin-bottom: 2rem">
          Lost in the stars? This page doesn't exist.
        </p>
        <a href="/">
          <button>Return Home</button>
        </a>
      </div>
    </div>

    <script src="shooting_stars.js"></script>
  </body>
</html>
